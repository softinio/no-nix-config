# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General settings
set -g base-index 1
set -g escape-time 10
set -g history-limit 10000
set -g mouse off
set -g mode-keys vi
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Default shell
set -g default-shell /opt/local/bin/fish

# Pane splits (using current path)
bind "'" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (Dvorak: d=Left, h=Down, t=Up, n=Right)
bind d select-pane -L
bind h select-pane -D
bind t select-pane -U
bind n select-pane -R

# Pane resize (repeatable, 10 units)
bind -r C-d resize-pane -L 10
bind -r C-h resize-pane -D 10
bind -r C-t resize-pane -U 10
bind -r C-n resize-pane -R 10

# Window switching by number
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Copy mode (vim-style)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Status bar
set -g status-position top
set -g status-justify centre
set -g status-left "#S #I:#P"
set -g status-right "#{?#{==:#{tms sessions},},, #{tms sessions}}"
set -g status-left-length 40
set -g status-right-length 80

# tms (tmux-sessionizer) integration
bind o display-popup -E "tms"
bind "(" switch-client -p
bind ")" switch-client -n

# TPM plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

# Tokyo Night tmux theme settings
set -g @tokyo-night-tmux_theme "night"
set -g @tokyo-night-tmux_transparent "1"
set -g @tokyo-night-tmux_show_path "1"

# tmux-resurrect settings
set -g @resurrect-strategy-nvim "session"

# tmux-continuum settings
set -g @continuum-restore "on"
set -g @continuum-save-interval "60"

# Initialize TPM (must be last line)
run "~/.tmux/plugins/tpm/tpm"
