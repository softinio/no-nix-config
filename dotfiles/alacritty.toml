[general]
import = []

[window]
decorations = "Buttonless"
opacity = 1.0
startup_mode = "Maximized"
dynamic_padding = true

[font]
size = 16.0

[font.normal]
family = "SF Mono"
style = "Regular"

[font.bold]
family = "SF Mono"
style = "Bold"

[font.italic]
family = "SF Mono"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "Off" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

# Tokyo Night Night color palette
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.cursor]
cursor = "#c0caf5"
text   = "#1a1b26"

[colors.selection]
background = "#283457"
text       = "CellForeground"

[[keyboard.bindings]]
key    = "Return"
mods   = "Shift"
chars  = "\n"

[[keyboard.bindings]]
key    = "K"
mods   = "Command"
action = "ClearHistory"

[[keyboard.bindings]]
key    = "N"
mods   = "Command"
action = "CreateNewWindow"
